apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: oadp
spec:
  version: ${VERSION}
  homepage: https://github.com/migtools/oadp-cli
  shortDescription: CLI for OpenShift API for Data Protection (OADP)
  description: |
    kubectl-oadp is a kubectl plugin for managing OpenShift API for Data Protection (OADP) backup and restore operations.
    
    It provides both admin and non-admin commands:
    - Admin commands: Full OADP/Velero backup and restore operations
    - Non-admin commands: Namespace-scoped backup operations with automatic namespace detection
    
    The plugin automatically detects the appropriate namespace from your current kubectl context
    for non-admin operations, following the principle of least privilege.
    
    Features:
    - Create and manage OADP backups
    - View backup status and logs  
    - Delete backups
    - Support for both cluster-admin and namespace-scoped operations
  caveats: |
    This plugin requires:
    - OADP operator to be installed in the cluster
    - Appropriate RBAC permissions for the operations you want to perform
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/migtools/oadp-cli/releases/download/${VERSION}/kubectl-oadp_${VERSION}_linux_amd64.tar.gz
    sha256: "${LINUX_AMD64_SHA}"
    files:
    - from: kubectl-oadp
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-oadp
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/migtools/oadp-cli/releases/download/${VERSION}/kubectl-oadp_${VERSION}_linux_arm64.tar.gz
    sha256: "${LINUX_ARM64_SHA}"
    files:
    - from: kubectl-oadp
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-oadp
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    uri: https://github.com/migtools/oadp-cli/releases/download/${VERSION}/kubectl-oadp_${VERSION}_linux_ppc64le.tar.gz
    sha256: "${LINUX_PPC64LE_SHA}"
    files:
    - from: kubectl-oadp
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-oadp
  - selector:
      matchLabels:
        os: linux
        arch: s390x
    uri: https://github.com/migtools/oadp-cli/releases/download/${VERSION}/kubectl-oadp_${VERSION}_linux_s390x.tar.gz
    sha256: "${LINUX_S390X_SHA}"
    files:
    - from: kubectl-oadp
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-oadp
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/migtools/oadp-cli/releases/download/${VERSION}/kubectl-oadp_${VERSION}_darwin_amd64.tar.gz
    sha256: "${DARWIN_AMD64_SHA}"
    files:
    - from: kubectl-oadp
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-oadp
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/migtools/oadp-cli/releases/download/${VERSION}/kubectl-oadp_${VERSION}_darwin_arm64.tar.gz
    sha256: "${DARWIN_ARM64_SHA}"
    files:
    - from: kubectl-oadp
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-oadp
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/migtools/oadp-cli/releases/download/${VERSION}/kubectl-oadp_${VERSION}_windows_amd64.tar.gz
    sha256: "${WINDOWS_AMD64_SHA}"
    files:
    - from: kubectl-oadp.exe
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-oadp.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
    uri: https://github.com/migtools/oadp-cli/releases/download/${VERSION}/kubectl-oadp_${VERSION}_windows_arm64.tar.gz
    sha256: "${WINDOWS_ARM64_SHA}"
    files:
    - from: kubectl-oadp.exe
      to: .
    - from: LICENSE
      to: .
    bin: kubectl-oadp.exe